apiVersion: apps/v1
kind: Deployment
metadata: { name: redpath, labels: { app: redpath } }
spec:
  replicas: 1
  selector: { matchLabels: { app: redpath } }
  template:
    metadata: { labels: { app: redpath } }
    spec:
      containers:
        - name: redpath
          image: ghcr.io/cognis-digital/redpath:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: redpath }
spec:
  selector: { app: redpath }
  ports: [{ port: 80, targetPort: 8000 }]
